<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84ff"/>
      <stop offset="0.55" stop-color="#0a5bd6"/>
      <stop offset="1" stop-color="#06c2a8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6f4ff"/>
    </linearGradient>
  </defs>

  <!-- squircle background -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#glow)"/>

  <!-- camera aperture / eye ring -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="#ffffff" stroke-width="26" stroke-opacity="0.92"/>

  <!-- aperture blades (hex) -->
  <g fill="none" stroke="#ffffff" stroke-width="14" stroke-opacity="0.55" stroke-linecap="round">
    <path d="M512 290 L662 377"/>
    <path d="M662 377 L662 550"/>
    <path d="M662 550 L512 637"/>
    <path d="M512 637 L362 550"/>
    <path d="M362 550 L362 377"/>
    <path d="M362 377 L512 290"/>
  </g>

  <!-- neural-engine node cluster = pupil -->
  <g stroke="#ffffff" stroke-width="12" stroke-opacity="0.85">
    <line x1="512" y1="430" x2="430" y2="512"/>
    <line x1="512" y1="430" x2="594" y2="512"/>
    <line x1="430" y1="512" x2="512" y2="594"/>
    <line x1="594" y1="512" x2="512" y2="594"/>
    <line x1="430" y1="512" x2="594" y2="512"/>
  </g>
  <g fill="#ffffff">
    <circle cx="512" cy="430" r="30"/>
    <circle cx="430" cy="512" r="30"/>
    <circle cx="594" cy="512" r="30"/>
    <circle cx="512" cy="594" r="30"/>
  </g>
  <circle cx="512" cy="512" r="20" fill="url(#iris)"/>
</svg>
