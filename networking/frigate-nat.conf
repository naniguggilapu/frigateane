# Frigate ANE — pf NAT rules.
# Let the Apple `container` VM subnet (192.168.64.0/24) reach the LAN
# (cameras, MQTT broker, Ollama) by NAT'ing out the Mac's interfaces.
# Adjust en0/en1 to match your active interface(s).
nat on en0 from 192.168.64.0/24 to any -> (en0)
nat on en1 from 192.168.64.0/24 to any -> (en1)
